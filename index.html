<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#1D8BCE" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Budget" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Budget du foyer</title>
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;background:#eef1f6;}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
    input,button{font-family:inherit;}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
    ::-webkit-scrollbar{width:8px;}::-webkit-scrollbar-thumb{background:#d0d5dd;border-radius:4px;}
    @keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    @keyframes pop{0%{transform:scale(.96);}100%{transform:scale(1);}}
    /* bandeau d'installation */
    #install-banner{position:fixed;left:12px;right:12px;bottom:12px;z-index:200;background:#1a1d29;color:#fff;
      border-radius:14px;padding:13px 16px;display:none;align-items:center;justify-content:space-between;gap:12px;
      box-shadow:0 8px 24px rgba(0,0,0,.3);animation:slideUp .3s ease;}
    #install-banner button{border:none;border-radius:9px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;}
    #install-yes{background:linear-gradient(135deg,#1D8BCE,#19A979);color:#fff;}
    #install-no{background:transparent;color:#8a94a6;}
  </style>
</head>
<body>
  <div id="root"></div>

  <div id="install-banner">
    <span style="font-size:13.5px;font-weight:600;">📲 Installer Budget sur ton écran d'accueil ?</span>
    <span style="display:flex;gap:6px;">
      <button id="install-no">Plus tard</button>
      <button id="install-yes">Installer</button>
    </span>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <script>
    window.onerror = (msg, src, line, col, err) => {
      document.getElementById("root").innerHTML =
        '<div style="padding:32px;font-family:system-ui;color:#C8516C;background:#fff;min-height:100vh">' +
        '<strong>Erreur au démarrage</strong><br><br>' +
        '<code style="font-size:12px;white-space:pre-wrap">' + msg + (line ? " (ligne " + line + ")" : "") + "</code>" +
        '<br><br><button onclick="localStorage.clear();location.reload()" style="padding:10px 18px;border-radius:8px;border:none;background:#C8516C;color:#fff;font-weight:700;cursor:pointer">Réinitialiser l\'app</button>' +
        "</div>";
    };
  </script>
  <script src="app.js"></script>

  <script>
    // Service worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(console.error);
      });
    }
    // Prompt d'installation (Android / Chrome desktop)
    let deferredPrompt = null;
    const banner = document.getElementById("install-banner");
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!localStorage.getItem("install-dismissed")) banner.style.display = "flex";
    });
    document.getElementById("install-yes").addEventListener("click", async () => {
      banner.style.display = "none";
      if (deferredPrompt) { deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; }
    });
    document.getElementById("install-no").addEventListener("click", () => {
      banner.style.display = "none";
      localStorage.setItem("install-dismissed", "1");
    });
  </script>
</body>
</html>
